<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Your AI toolkit">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1b2d"/>
      <stop offset="1" stop-color="#08101d"/>
    </linearGradient>
  </defs>
  <rect width="880" height="600" rx="20" fill="url(#bg4)"/>

  <text x="48" y="64" font-size="15" letter-spacing="3" font-weight="700" fill="#e3a247">YOUR AI TOOLKIT</text>
  <text x="48" y="104" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#faf7f1">Installed &amp; working — not just talked about</text>

  <!-- 6 tiles -->
  <g>
    <!-- row 1 -->
    <g>
      <rect x="48" y="160" width="252" height="120" rx="14" fill="#1b2840" stroke="#2a3c59"/>
      <text x="72" y="208" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#e3a247">Claude</text>
      <text x="72" y="238" font-size="13.5" fill="#9aabc4">Your AI thinking &amp;</text>
      <text x="72" y="256" font-size="13.5" fill="#9aabc4">building partner</text>
    </g>
    <g>
      <rect x="314" y="160" width="252" height="120" rx="14" fill="#1b2840" stroke="#2a3c59"/>
      <text x="338" y="208" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#e3a247">ChatGPT</text>
      <text x="338" y="238" font-size="13.5" fill="#9aabc4">Everyday AI</text>
      <text x="338" y="256" font-size="13.5" fill="#9aabc4">assistant</text>
    </g>
    <g>
      <rect x="580" y="160" width="252" height="120" rx="14" fill="#1b2840" stroke="#2a3c59"/>
      <text x="604" y="208" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#e3a247">Cursor</text>
      <text x="604" y="238" font-size="13.5" fill="#9aabc4">AI-native editor</text>
      <text x="604" y="256" font-size="13.5" fill="#9aabc4">for builders</text>
    </g>
    <!-- row 2 -->
    <g>
      <rect x="48" y="300" width="252" height="120" rx="14" fill="#1b2840" stroke="#2a3c59"/>
      <text x="72" y="348" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#e3a247">AI Agents</text>
      <text x="72" y="378" font-size="13.5" fill="#9aabc4">AI that does work,</text>
      <text x="72" y="396" font-size="13.5" fill="#9aabc4">not just chats</text>
    </g>
    <g>
      <rect x="314" y="300" width="252" height="120" rx="14" fill="#1b2840" stroke="#2a3c59"/>
      <text x="338" y="348" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#e3a247">Vibe coding</text>
      <text x="338" y="378" font-size="13.5" fill="#9aabc4">Build software by</text>
      <text x="338" y="396" font-size="13.5" fill="#9aabc4">describing it</text>
    </g>
    <g>
      <rect x="580" y="300" width="252" height="120" rx="14" fill="#1b2840" stroke="#2a3c59"/>
      <text x="604" y="342" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#e3a247">Custom</text>
      <text x="604" y="366" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#e3a247">workflows</text>
      <text x="604" y="396" font-size="13.5" fill="#9aabc4">Automate real tasks</text>
    </g>
  </g>

  <rect x="48" y="470" width="784" height="74" rx="14" fill="#d99232"/>
  <text x="440" y="504" text-anchor="middle" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#0f1b2d">By the end of two days, these run on your own laptop.</text>
  <text x="440" y="528" text-anchor="middle" font-size="13.5" fill="#69391d">Set up, configured, and actually working for you.</text>
</svg>
