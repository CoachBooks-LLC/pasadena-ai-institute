<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Two tracks: Zero Experience and I Have an Idea">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf7f1"/>
      <stop offset="1" stop-color="#f4efe5"/>
    </linearGradient>
  </defs>
  <rect width="880" height="600" rx="20" fill="url(#bg2)"/>

  <text x="440" y="64" text-anchor="middle" font-size="15" letter-spacing="3" font-weight="700" fill="#9c551f">TWO WAYS IN, ONE ROOM</text>
  <text x="440" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#0f1b2d">Choose your path</text>

  <!-- Track 1 card -->
  <g>
    <rect x="48" y="150" width="370" height="390" rx="18" fill="#ffffff" stroke="#e4e9f0"/>
    <rect x="48" y="150" width="370" height="64" rx="18" fill="#0f1b2d"/>
    <rect x="48" y="184" width="370" height="30" fill="#0f1b2d"/>
    <text x="74" y="190" font-size="12.5" letter-spacing="2" font-weight="700" fill="#e3a247">TRACK 1</text>
    <text x="74" y="245" font-family="Georgia, serif" font-size="25" font-weight="700" fill="#0f1b2d">Zero Experience</text>
    <text x="74" y="275" font-size="14" fill="#456089">I want to learn AI from scratch</text>

    <g font-size="14.5" fill="#2a3c59">
      <circle cx="82" cy="318" r="4" fill="#d99232"/><text x="98" y="323">Get set up &amp; confident</text>
      <circle cx="82" cy="352" r="4" fill="#d99232"/><text x="98" y="357">Prompting that works</text>
      <circle cx="82" cy="386" r="4" fill="#d99232"/><text x="98" y="391">AI for your daily work</text>
      <circle cx="82" cy="420" r="4" fill="#d99232"/><text x="98" y="425">Understand AI agents</text>
    </g>

    <rect x="74" y="452" width="318" height="64" rx="12" fill="#f4efe5"/>
    <text x="90" y="478" font-size="12" letter-spacing="1.5" font-weight="700" fill="#9c551f">YOU LEAVE WITH</text>
    <text x="90" y="500" font-size="14" fill="#0f1b2d">A workflow you'll use Monday</text>
  </g>

  <!-- Track 2 card -->
  <g>
    <rect x="462" y="150" width="370" height="390" rx="18" fill="#0f1b2d"/>
    <text x="488" y="190" font-size="12.5" letter-spacing="2" font-weight="700" fill="#e3a247">TRACK 2</text>
    <text x="488" y="245" font-family="Georgia, serif" font-size="25" font-weight="700" fill="#faf7f1">I Have an Idea</text>
    <text x="488" y="275" font-size="14" fill="#9aabc4">Let's build it, zero to one</text>

    <g font-size="14.5" fill="#e4e9f0">
      <circle cx="496" cy="318" r="4" fill="#e3a247"/><text x="512" y="323">Cursor + Claude set up</text>
      <circle cx="496" cy="352" r="4" fill="#e3a247"/><text x="512" y="357">Learn vibe coding</text>
      <circle cx="496" cy="386" r="4" fill="#e3a247"/><text x="512" y="391">Idea to prototype</text>
      <circle cx="496" cy="420" r="4" fill="#e3a247"/><text x="512" y="425">Custom workflows &amp; agents</text>
    </g>

    <rect x="488" y="452" width="318" height="64" rx="12" fill="#1b2840"/>
    <text x="504" y="478" font-size="12" letter-spacing="1.5" font-weight="700" fill="#e3a247">YOU LEAVE WITH</text>
    <text x="504" y="500" font-size="14" fill="#faf7f1">A working prototype you built</text>
  </g>

  <!-- connector -->
  <circle cx="440" cy="345" r="28" fill="#faf7f1" stroke="#d99232" stroke-width="2"/>
  <text x="440" y="351" text-anchor="middle" font-size="13" font-weight="700" fill="#9c551f">OR</text>
</svg>
