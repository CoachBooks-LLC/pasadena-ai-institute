<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="Inter, system-ui, sans-serif" role="img" aria-label="What you walk away with">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf7f1"/>
      <stop offset="1" stop-color="#f4efe5"/>
    </linearGradient>
  </defs>
  <rect width="880" height="600" rx="20" fill="url(#bg5)"/>

  <text x="48" y="64" font-size="15" letter-spacing="3" font-weight="700" fill="#9c551f">AFTER TWO DAYS, YOU CAN…</text>
  <text x="48" y="104" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#0f1b2d">You leave with results, not notes</text>

  <!-- 4 outcome rows -->
  <g>
    <g>
      <rect x="48" y="150" width="784" height="92" rx="14" fill="#ffffff" stroke="#e4e9f0"/>
      <circle cx="98" cy="196" r="22" fill="#0f1b2d"/>
      <text x="98" y="203" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#e3a247">1</text>
      <text x="142" y="190" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#0f1b2d">Confidently use AI every day</text>
      <text x="142" y="216" font-size="14" fill="#456089">Tools set up and the skills to get real value, daily.</text>
    </g>
    <g>
      <rect x="48" y="256" width="784" height="92" rx="14" fill="#ffffff" stroke="#e4e9f0"/>
      <circle cx="98" cy="302" r="22" fill="#0f1b2d"/>
      <text x="98" y="309" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#e3a247">2</text>
      <text x="142" y="296" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#0f1b2d">A workflow or prototype you built</text>
      <text x="142" y="322" font-size="14" fill="#456089">Something real for your work — or your idea, brought to life.</text>
    </g>
    <g>
      <rect x="48" y="362" width="784" height="92" rx="14" fill="#ffffff" stroke="#e4e9f0"/>
      <circle cx="98" cy="408" r="22" fill="#0f1b2d"/>
      <text x="98" y="415" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#e3a247">3</text>
      <text x="142" y="402" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#0f1b2d">Clarity on what actually matters</text>
      <text x="142" y="428" font-size="14" fill="#456089">Know what's genuinely useful for you — and what's just hype.</text>
    </g>
    <g>
      <rect x="48" y="468" width="784" height="92" rx="14" fill="#0f1b2d"/>
      <circle cx="98" cy="514" r="22" fill="#d99232"/>
      <text x="98" y="521" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#0f1b2d">4</text>
      <text x="142" y="508" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#faf7f1">A local community to keep going</text>
      <text x="142" y="534" font-size="14" fill="#9aabc4">A Pasadena network of people learning and building with AI.</text>
    </g>
  </g>
</svg>
